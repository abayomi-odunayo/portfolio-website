{% extends "base.html" %}

{% block content %}

<div style="padding:40px;">

    <h1>Contact Messages</h1>

    <table border="1" cellpadding="10" cellspacing="0">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
        </tr>

        {% for message in messages %}

        <tr>
            <td>{{ message.id }}</td>
            <td>{{ message.name }}</td>
            <td>{{ message.email }}</td>
            <td>{{ message.message }}</td>
        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
